version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: firstknock_local
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  martin:
    image: maplibre/martin:latest
    container_name: firstknock_martin
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/firstknock_local
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  # Optional: pgAdmin for GUI management
  # pgadmin:
  #   image: dpage/pgadmin4
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: root
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
